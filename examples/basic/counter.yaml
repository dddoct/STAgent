target:
  program: "examples/basic/counter.exe"
  timeout: 5

wrapper:
  enabled: true
  mode: "args"
  schema:
    - name: "start"
      type: "int"
      range: [1, 5]
    - name: "end"
      type: "int"
      range: [5, 10]

assertions:
  - type: "exit_code"
    expected: 0
  - type: "contains"
    field: "stdout"
    value: "{start}"
  - type: "contains"
    field: "stdout"
    value: "{end}"
