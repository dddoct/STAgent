target:
  program: "examples/string/reverse.exe"
  timeout: 5

wrapper:
  enabled: true
  mode: "args"
  schema:
    - name: "text"
      type: "string"
      values: ["hello", "world", "12345", "abc", ""]

assertions:
  - type: "exit_code"
    expected: 0
  - type: "regex"
    field: "stdout"
    pattern: "^.*\\n$"
