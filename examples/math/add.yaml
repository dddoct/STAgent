target:
  program: "examples/math/add.exe"
  timeout: 5

wrapper:
  enabled: true
  mode: "args"
  schema:
    - name: "num1"
      type: "float"
      range: [0.0, 100.0]
    - name: "num2"
      type: "float"
      range: [0.0, 100.0]

assertions:
  - type: "exit_code"
    expected: 0
  - type: "regex"
    field: "stdout"
    pattern: "^\\d+\\.\\d{2}\\n$"
