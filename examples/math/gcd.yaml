target:
  program: "examples/math/gcd.exe"
  timeout: 5

wrapper:
  enabled: true
  mode: "args"
  schema:
    - name: "num1"
      type: "int"
      range: [1, 100]
    - name: "num2"
      type: "int"
      range: [1, 100]

assertions:
  - type: "exit_code"
    expected: 0
  - type: "regex"
    field: "stdout"
    pattern: "^\\d+\\n$"
